<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { gelap:'#121212', kartu:'#1E1E1E', ungu:'#8B5CF6', merah:'#EF4444' } } }
        }
    </script>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center mb-6">
        <button onclick="bukaMenu()" class="text-gray-300 hover:text-ungu text-xl"><i class="fa fa-bars"></i></button>
        <h1 class="text-xl font-bold text-merah">⚙️ Panel Admin</h1>
        <div></div>
    </div>

    <div class="space-y-4">
        <div class="bg-kartu p-4 rounded-xl border border-gray-700">
            <h3 class="font-bold text-lg mb-3">➕ Tambah Item Baru</h3>
            <select id="game" class="w-full bg-gelap p-3 rounded-lg mb-3 outline-none">
                <option value="">-- Pilih Game --</option>
                <option value="Mobile Legends">Mobile Legends</option>
                <option value="Free Fire">Free Fire</option>
                <option value="PUBG Mobile">PUBG Mobile</option>
            </select>
            <input type="text" id="item" placeholder="70 Diamond" class="w-full bg-gelap p-3 rounded-lg mb-3 outline-none">
            <input type="number" id="harga" placeholder="10000" class="w-full bg-gelap p-3 rounded-lg mb-3 outline-none">
            <button onclick="tambahItem()" class="w-full bg-ungu py-3 rounded-lg font-bold hover:bg-ungu/80">
                <i class="fa fa-plus mr-1"></i> Tambahkan
            </button>
        </div>

        <div class="bg-kartu p-4 rounded-xl border border-gray-700">
            <h3 class="font-bold text-lg mb-3">📋 Daftar Item</h3>
            <div id="daftarItem" class="space-y-2 text-sm"><p class="text-gray-400">Kosong</p></div>
        </div>
    </div>
</div>

<script>
const logoGame = {
    'Mobile Legends':'https://i.imgur.com/6XZpKqG.png',
    'Free Fire':'https://i.imgur.com/9cXQZpD.png',
    'PUBG Mobile':'https://i.imgur.com/rdcXjwM.png'
};

// BERSIHKAN DATA LAMA SAAT BUKA ADMIN
window.onload = function(){
    localStorage.removeItem('semuaItem'); // HAPUS DATA LAMA TOTAL
    tampilDaftar();
};

function tambahItem(){
    let g = document.getElementById('game').value;
    let i = document.getElementById('item').value.trim();
    let h = document.getElementById('harga').value.trim();
    if(!g||!i||!h){alert('Isi semua!');return;}

    let data = [];
    // AMBIL DATA BARU ATAU KOSONG
    let lama = localStorage.getItem('dataToko');
    if(lama) data = JSON.parse(lama);

    data.push({
        game:g, item:i,
        harga:'Rp '+Number(h).toLocaleString('id-ID'),
        logo:logoGame[g]
    });

    // SIMPAN DENGAN NAMA KUNCI PASTI: "dataToko"
    localStorage.setItem('dataToko', JSON.stringify(data));
    alert('✅ BERHASIL! Buka Daftar Game lalu REFRESH');
    
    document.getElementById('game').value='';
    document.getElementById('item').value='';
    document.getElementById('harga').value='';
    tampilDaftar();
}

function tampilDaftar(){
    let data = JSON.parse(localStorage.getItem('dataToko')||'[]');
    let wadah = document.getElementById('daftarItem');
    wadah.innerHTML = '';
    if(data.length===0){wadah.innerHTML='<p class="text-gray-400">Belum ada item</p>';return;}
    data.forEach(d=>{
        wadah.innerHTML += `<div class="p-2 bg-gelap rounded"><b>${d.game}</b> · ${d.item} → ${d.harga}</div>`;
    });
}
</script>
</body>
</html>
