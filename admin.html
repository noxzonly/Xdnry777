<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { gelap:'#121212', kartu:'#1E1E1E', ungu:'#8B5CF6', merah:'#EF4444' } } }
        }
    </script>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center mb-6">
        <button onclick="bukaMenu()" class="text-gray-300 hover:text-ungu text-xl"><i class="fa fa-bars"></i></button>
        <h1 class="text-xl font-bold text-merah">⚙️ Panel Admin</h1>
        <div></div>
    </div>

    <div class="space-y-4">
        <div class="bg-kartu p-4 rounded-xl border border-gray-700">
            <h3 class="font-bold text-lg mb-3">➕ Tambah Item Baru</h3>
            <select id="game" class="w-full bg-gelap p-3 rounded-lg mb-3 outline-none">
                <option value="">-- Pilih Game --</option>
                <option value="Mobile Legends">Mobile Legends</option>
                <option value="Free Fire">Free Fire</option>
                <option value="PUBG Mobile">PUBG Mobile</option>
                <option value="Valorant">Valorant</option>
                <option value="Genshin Impact">Genshin Impact</option>
                <option value="Honor of Kings">Honor of Kings</option>
            </select>
            <input type="text" id="item" placeholder="Contoh: 70 Diamond" class="w-full bg-gelap p-3 rounded-lg mb-3 outline-none">
            <input type="number" id="harga" placeholder="Harga: 10000" class="w-full bg-gelap p-3 rounded-lg mb-3 outline-none">
            <button onclick="tambahItem()" class="w-full bg-ungu py-3 rounded-lg font-bold hover:bg-ungu/80">
                <i class="fa fa-plus mr-1"></i> Tambahkan
            </button>
        </div>

        <div class="bg-kartu p-4 rounded-xl border border-gray-700">
            <h3 class="font-bold text-lg mb-3">📋 Daftar Item Tersimpan</h3>
            <div id="daftarItem" class="space-y-2 text-sm"><p class="text-gray-400">Memuat...</p></div>
        </div>
    </div>
</div>

<div id="menuSamping" class="fixed top-0 left-0 h-full w-64 bg-kartu border-r border-gray-700 z-50 p-4 transform -translate-x-full transition-all">
    <div class="flex justify-between items-center mb-6"><span class="text-xl font-bold text-ungu">Xdnry777</span><button onclick="tutupMenu()" class="text-2xl text-gray-300"><i class="fa fa-times"></i></button></div>
    <nav class="space-y-3">
        <a href="index.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-home mr-2"></i> Beranda</a>
        <a href="daftar-game.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-gamepad mr-2"></i> Daftar Game</a>
        <a href="riwayat.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-list-alt mr-2"></i> Riwayat</a>
        <a href="admin.html" class="block py-2 border-b border-gray-700 text-merah"><i class="fa fa-cog mr-2"></i> Panel Admin</a>
    </nav>
</div>
<div id="latarTutup" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
const logoGame = {
    'Mobile Legends':'https://i.imgur.com/6XZpKqG.png',
    'Free Fire':'https://i.imgur.com/9cXQZpD.png',
    'PUBG Mobile':'https://i.imgur.com/rdcXjwM.png',
    'Valorant':'https://i.imgur.com/9sD2fQm.png',
    'Genshin Impact':'https://i.imgur.com/5tG9aXj.png',
    'Honor of Kings':'https://i.imgur.com/8kD7sLz.png'
};

window.onload = function(){
    if(!JSON.parse(localStorage.getItem('akunAktif')||'{}').user==='admin'){alert('Hanya Admin!');location.href='index.html';return;}
    tampilDaftar();
};
function bukaMenu(){document.getElementById('menuSamping').classList.remove('-translate-x-full');document.getElementById('latarTutup').classList.remove('hidden');}
function tutupMenu(){document.getElementById('menuSamping').classList.add('-translate-x-full');document.getElementById('latarTutup').classList.add('hidden');}

function tambahItem(){
    let g = document.getElementById('game').value;
    let i = document.getElementById('item').value.trim();
    let h = document.getElementById('harga').value.trim();
    if(!g||!i||!h){alert('Lengkapi semua data!');return;}

    // KUNCI PENYIMPANAN: SAMA PENUH DENGAN DAFTAR GAME
    let semua = JSON.parse(localStorage.getItem('semuaItem')||'[]');
    semua.push({
        id: Date.now(), 
        game: g, 
        item: i,
        harga: 'Rp ' + Number(h).toLocaleString('id-ID'), 
        logo: logoGame[g]
    });
    
    localStorage.setItem('semuaItem', JSON.stringify(semua));
    alert('✅ BERHASIL DITAMBAHKAN! Sekarang cek Daftar Game ya.');
    
    document.getElementById('game').value='';
    document.getElementById('item').value='';
    document.getElementById('harga').value='';
    tampilDaftar();
}

function hapusItem(id){
    if(!confirm('Yakin mau hapus item ini?')) return;
    let semua = JSON.parse(localStorage.getItem('semuaItem')||'[]').filter(item => item.id !== id);
    localStorage.setItem('semuaItem', JSON.stringify(semua));
    tampilDaftar();
}

function tampilDaftar(){
    let semua = JSON.parse(localStorage.getItem('semuaItem')||'[]');
    let wadah = document.getElementById('daftarItem');
    wadah.innerHTML = '';
    
    if(semua.length===0){
        wadah.innerHTML='<p class="text-gray-400">Belum ada item yang disimpan</p>';
        return;
    }
    
    semua.forEach(d=>{
        wadah.innerHTML += `<div class="flex justify-between items-center p-2 bg-gelap rounded">
            <div><b>${d.game}</b> · ${d.item} → <span class="text-ungu font-bold">${d.harga}</span></div>
            <button onclick="hapusItem(${d.id})" class="text-merah px-2"><i class="fa fa-trash"></i></button>
        </div>`;
    });
}
</script>
</body>
</html>
