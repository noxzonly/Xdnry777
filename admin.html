<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gelap: '#121212',
                        kartu: '#1E1E1E',
                        ungu: '#8B5CF6',
                        admin: '#EF4444'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center mb-6">
        <button onclick="bukaMenu()" class="text-gray-300 hover:text-ungu text-xl">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="text-xl font-bold text-admin">⚙️ Panel Admin</h1>
        <div></div>
    </div>

    <div class="space-y-4">
        <!-- ✅ TAMBAH PILIHAN BARU -->
        <div class="bg-kartu p-4 rounded-xl border border-gray-700">
            <h3 class="font-bold text-lg mb-3">➕ Tambah Pilihan Item Baru</h3>
            <div class="space-y-3 mb-4">
                <select id="pilihGame" class="w-full bg-gelap p-3 rounded-lg outline-none">
                    <option value="">-- Pilih Nama Game --</option>
                    <option value="Mobile Legends">Mobile Legends</option>
                    <option value="Free Fire">Free Fire</option>
                    <option value="PUBG Mobile">PUBG Mobile</option>
                    <option value="Valorant">Valorant</option>
                    <option value="Genshin Impact">Genshin Impact</option>
                    <option value="Honor of Kings">Honor of Kings</option>
                </select>
                <input type="text" id="itemBaru" placeholder="Nama Item: 100 Diamond / 100 UC" class="w-full bg-gelap p-3 rounded-lg outline-none">
                <input type="number" id="hargaBaru" placeholder="Harga: 15000" class="w-full bg-gelap p-3 rounded-lg outline-none">
            </div>
            <button onclick="tambahItem()" class="w-full bg-ungu py-3 rounded-lg font-bold hover:bg-ungu/80">
                <i class="fa fa-plus-circle mr-1"></i> Tambahkan Item
            </button>
        </div>

        <!-- ✅ UBAH HARGA YANG SUDAH ADA -->
        <div class="bg-kartu p-4 rounded-xl border border-gray-700">
            <h3 class="font-bold text-lg mb-3">✏️ Ubah Harga</h3>
            <div class="space-y-3 mb-4">
                <input type="text" id="namaGameUbah" placeholder="Nama Game" class="w-full bg-gelap p-3 rounded-lg outline-none">
                <input type="text" id="itemUbah" placeholder="Nama Item" class="w-full bg-gelap p-3 rounded-lg outline-none">
                <input type="number" id="hargaGanti" placeholder="Harga Baru" class="w-full bg-gelap p-3 rounded-lg outline-none">
            </div>
            <button onclick="ubahHargaLama()" class="w-full bg-yellow-600 py-3 rounded-lg font-bold hover:bg-yellow-600/80">
                <i class="fa fa-pencil mr-1"></i> Simpan Perubahan
            </button>
        </div>

        <div class="bg-kartu p-4 rounded-xl border border-gray-700">
            <h3 class="font-bold text-lg mb-3">📋 Semua Item Toko</h3>
            <div id="daftarItem" class="space-y-2 text-sm">
                <p class="text-gray-400">Memuat data...</p>
            </div>
        </div>
    </div>
</div>

<div id="menuSamping" class="fixed top-0 left-0 h-full w-64 bg-kartu border-r border-gray-700 z-50 p-4 transform -translate-x-full transition-all">
    <div class="flex justify-between items-center mb-6">
        <span class="text-xl font-bold text-ungu">Xdnry777</span>
        <button onclick="tutupMenu()" class="text-2xl text-gray-300 hover:text-white">
            <i class="fa fa-times"></i>
        </button>
    </div>
    <nav class="space-y-3">
        <a href="index.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-home mr-2"></i> Beranda</a>
        <a href="daftar-game.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-gamepad mr-2"></i> Daftar Game</a>
        <a href="riwayat.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-list-alt mr-2"></i> Riwayat Pesanan</a>
        <a href="cara-beli.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-credit-card mr-2"></i> Cara Beli</a>
        <a href="masuk.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-user mr-2"></i> Akun Saya</a>
        <a href="admin.html" class="block py-2 border-b border-gray-700 text-admin"><i class="fa fa-cog mr-2"></i> Panel Admin</a>
    </nav>
</div>
<div id="latarTutup" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
window.onload = function(){
    const aktif = JSON.parse(localStorage.getItem('akunAktif') || '{}');
    if(aktif.user !== 'admin'){ alert("Hanya Admin!"); location.href="index.html"; return; }
    tampilSemua();
};
function bukaMenu(){document.getElementById('menuSamping').classList.remove('-translate-x-full');document.getElementById('latarTutup').classList.remove('hidden');}
function tutupMenu(){document.getElementById('menuSamping').classList.add('-translate-x-full');document.getElementById('latarTutup').classList.add('hidden');}

// DAFTAR LOGO UNTUK GAME
const logoGame = {
    'Mobile Legends': 'https://files.catbox.moe/q692nn.jpg',
    'Free Fire': 'https://files.catbox.moe/00jh4l.jpg',
    'PUBG Mobile': 'https://files.catbox.moe/xfxvzz.jpg',
    'Valorant': 'https://files.catbox.moe/wvkmfq.jpg',
    'Genshin Impact': 'https://files.catbox.moe/080ygh.jpg',
    'Honor of Kings': 'https://files.catbox.moe/gcbelg.jpg'
};

// FUNGSI TAMBAH ITEM BARU
function tambahItem(){
    let game = document.getElementById('pilihGame').value;
    let item = document.getElementById('itemBaru').value.trim();
    let harga = document.getElementById('hargaBaru').value.trim();

    if(!game || !item || !harga){ alert("Lengkapi semua data!"); return; }

    let semuaItem = JSON.parse(localStorage.getItem('daftarItemLengkap') || '[]');
    let kunci = game.toLowerCase() + "||" + item.toLowerCase();

    // Cek kalau sudah ada
    let cek = semuaItem.find(i => i.kunci === kunci);
    if(cek){ alert("Item ini sudah ada! Silakan ubah harganya saja."); return; }

    semuaItem.push({
        kunci: kunci,
        game: game,
        item: item,
        harga: "Rp " + Number(harga).toLocaleString('id-ID'),
        logo: logoGame[game]
    });

    localStorage.setItem('daftarItemLengkap', JSON.stringify(semuaItem));
    alert("✅ Item baru berhasil ditambahkan!");

    document.getElementById('pilihGame').value = '';
    document.getElementById('itemBaru').value = '';
    document.getElementById('hargaBaru').value = '';
    tampilSemua();
}

// FUNGSI UBAH HARGA
function ubahHargaLama(){
    let game = document.getElementById('namaGameUbah').value.trim();
    let item = document.getElementById('itemUbah').value.trim();
    let harga = document.getElementById('hargaGanti').value.trim();

    if(!game || !item || !harga){ alert("Lengkapi data!"); return; }

    let semuaItem = JSON.parse(localStorage.getItem('daftarItemLengkap') || '[]');
    let kunci = game.toLowerCase() + "||" + item.toLowerCase();
    let idx = semuaItem.findIndex(i => i.kunci === kunci);

    if(idx === -1){ alert("Data tidak ditemukan!"); return; }

    semuaItem[idx].harga = "Rp " + Number(harga).toLocaleString('id-ID');
    localStorage.setItem('daftarItemLengkap', JSON.stringify(semuaItem));
    alert("✅ Harga berhasil diubah!");

    document.getElementById('namaGameUbah').value = '';
    document.getElementById('itemUbah').value = '';
    document.getElementById('hargaGanti').value = '';
    tampilSemua();
}

// TAMPILKAN DAFTAR DI ADMIN
function tampilSemua(){
    let data = JSON.parse(localStorage.getItem('daftarItemLengkap') || '[]');
    let wadah = document.getElementById('daftarItem');
    wadah.innerHTML = '';

    if(data.length === 0){
        wadah.innerHTML = '<p class="text-gray-400">Belum ada item yang ditambahkan</p>';
        return;
    }

    data.forEach(d => {
        wadah.innerHTML += `
        <div class="flex justify-between items-center p-2 bg-gelap rounded-lg">
            <div class="text-sm">
                <b>${d.game}</b> · ${d.item}
            </div>
            <span class="text-ungu font-bold">${d.harga}</span>
        </div>`;
    });
}
</script>
</body>
</html>
