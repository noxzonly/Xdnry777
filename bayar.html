<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayar - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { gelap:'#121212', kartu:'#1E1E1E', ungu:'#8B5CF6' } } } }
    </script>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center mb-6">
        <button onclick="bukaMenu()" class="text-gray-300 hover:text-ungu text-xl">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="text-xl font-bold text-ungu">Data Pesanan</h1>
        <button onclick="history.back()" class="text-gray-300 hover:text-ungu text-xl">
            <i class="fa fa-arrow-left"></i>
        </button>
    </div>

    <div class="bg-kartu p-4 rounded-xl border border-gray-700 mb-4 space-y-3">
        <div><p class="text-gray-400 text-sm">Game</p><p id="gameNama" class="font-bold">-</p></div>
        <div><p class="text-gray-400 text-sm">Item</p><p id="itemNama" class="font-bold">-</p></div>
        <div><p class="text-gray-400 text-sm">Total Bayar</p><p id="hargaTotal" class="text-ungu font-bold text-xl">-</p></div>
    </div>

    <div class="bg-kartu p-4 rounded-xl border border-gray-700 mb-4 space-y-3">
        <input type="text" id="idTujuan" placeholder="ID Game / Server" class="w-full bg-gelap p-3 rounded-lg outline-none">
        <input type="text" id="namaAkun" placeholder="Nama Akun Game" class="w-full bg-gelap p-3 rounded-lg outline-none">
        <input type="text" id="nomorWa" placeholder="Nomor WhatsApp" class="w-full bg-gelap p-3 rounded-lg outline-none">
    </div>

    <button onclick="kirimPesanan()" class="w-full bg-green-600 py-4 rounded-xl font-bold text-lg hover:bg-green-600/80">
        <i class="fa fa-whatsapp mr-1"></i> KIRIM PESANAN
    </button>
</div>

<!-- MENU SAMPING -->
<div id="menuSamping" class="fixed top-0 left-0 h-full w-64 bg-kartu border-r border-gray-700 z-50 p-4 transform -translate-x-full transition-all">
    <div class="flex justify-between items-center mb-6">
        <span class="text-xl font-bold text-ungu">Xdnry777</span>
        <button onclick="tutupMenu()" class="text-2xl text-gray-300 hover:text-white">
            <i class="fa fa-times"></i>
        </button>
    </div>
    <nav class="space-y-3">
        <a href="index.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-home mr-2"></i> Beranda</a>
        <a href="daftar-game.html" class="block py-2 border-b border-gray-700 text-ungu"><i class="fa fa-gamepad mr-2"></i> Daftar Game</a>
        <a href="riwayat.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-list-alt mr-2"></i> Riwayat Pesanan</a>
        <a href="cara-beli.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-credit-card mr-2"></i> Cara Beli</a>
        <a href="masuk.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-user mr-2"></i> Akun Saya</a>
    </nav>
</div>
<div id="latarTutup" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
function bukaMenu(){
    document.getElementById('menuSamping').classList.remove('-translate-x-full');
    document.getElementById('latarTutup').classList.remove('hidden');
}
function tutupMenu(){
    document.getElementById('menuSamping').classList.add('-translate-x-full');
    document.getElementById('latarTutup').classList.add('hidden');
}

let data;
window.onload = function(){
    data = JSON.parse(localStorage.getItem('pilihSekarang')||'{}');
    if(!data.game){alert('Pilih dulu itemnya!');location.href='daftar-game.html';return;}

    document.getElementById('gameNama').textContent = data.game;
    document.getElementById('itemNama').textContent = data.item;
    document.getElementById('hargaTotal').textContent = data.harga;
};

function kirimPesanan(){
    let id = document.getElementById('idTujuan').value.trim();
    let nama = document.getElementById('namaAkun').value.trim();
    let wa = document.getElementById('nomorWa').value.trim();
    if(!id||!nama||!wa){alert('Lengkapi semua data!');return;}

    alert('✅ Pesanan Berhasil! Silakan bayar sebesar ' + data.harga);
    localStorage.removeItem('pilihSekarang');
    location.href='daftar-game.html';
}
</script>
</body>
</html>
