<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { gelap: '#121212', kartu: '#1E1E1E', ungu: '#8B5CF6' } } } }
    </script>
    <style>
        .struk { background: #fff; color: #000; }
        @media print { body *:not(.struk, .struk *) { display: none; } }
    </style>
</head>
<body class="bg-gelap text-white min-h-screen p-4">

<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-center mb-6"><span class="text-ungu">Konfirmasi Pesanan</span></h1>

    <div class="bg-kartu p-5 rounded-xl border border-gray-700 mb-6">
        <div class="space-y-3">
            <div class="p-3 bg-gelap rounded-lg">
                <p class="text-gray-400 text-sm">Game</p>
                <p class="font-bold" id="game">-</p>
            </div>
            <div class="p-3 bg-gelap rounded-lg">
                <p class="text-gray-400 text-sm">Item</p>
                <p class="font-bold" id="item">-</p>
            </div>
            <div class="p-3 bg-gelap rounded-lg">
                <p class="text-gray-400 text-sm">Total Bayar</p>
                <p class="font-bold text-xl text-ungu" id="harga">-</p>
            </div>
        </div>

        <div class="flex gap-3 mt-5">
            <a href="daftar-game.html" class="flex-1 bg-gray-700 py-3 rounded-lg font-bold text-center">Ubah</a>
            <button onclick="buatStruk()" class="flex-1 bg-ungu py-3 rounded-lg font-bold">Buat Struk</button>
        </div>
    </div>

    <!-- INFO PEMBAYARAN -->
    <div class="bg-kartu p-5 rounded-xl border border-gray-700">
        <h3 class="text-lg font-bold text-green-400 mb-3"><i class="fa fa-qrcode"></i> Bayar via QRIS</h3>
        <img src="https://files.catbox.moe/g2agou.jpg" class="w-48 h-48 mx-auto rounded mb-3">
        <h3 class="text-lg font-bold text-blue-400 mt-5 mb-3"><i class="fa fa-bank"></i> Transfer Dana</h3>
        <p class="text-2xl font-bold text-center">0851-6993-5089</p>
        <p class="text-gray-400 text-center">a.n EN**** YU******</p>
    </div>
</div>

<!-- POPUP STRUK -->
<div id="boxStruk" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden p-4">
    <div class="struk p-5 rounded-lg w-full max-w-sm">
        <div class="text-center border-b pb-3 mb-3">
            <h2 class="text-xl font-bold">Xdnry777</h2>
            <p class="text-xs text-gray-500">Top Up Terpercaya</p>
        </div>
        <div class="space-y-1 text-sm">
            <div class="flex justify-between"><span>Kode Struk:</span><span class="font-mono font-bold" id="kode">-</span></div>
            <div class="flex justify-between"><span>Game:</span><span id="g">-</span></div>
            <div class="flex justify-between"><span>Item:</span><span id="i">-</span></div>
            <div class="flex justify-between font-bold text-lg border-t pt-2 mt-2"><span>Total:</span><span id="hrg">-</span></div>
            <div class="flex justify-between text-xs text-gray-500 mt-2"><span>Waktu:</span><span id="waktu">-</span></div>
        </div>
        <p class="text-center text-xs text-gray-400 mt-4">Terima Kasih!</p>

        <div class="flex gap-2 mt-4">
            <button onclick="kirimWA()" class="flex-1 bg-green-500 text-white py-2 rounded font-bold">
                <i class="fa fa-whatsapp"></i> Kirim WA
            </button>
            <button onclick="tutupStruk()" class="flex-1 bg-gray-600 py-2 rounded font-bold">Tutup</button>
        </div>
    </div>
</div>

<script>
let data = {};

// AMBIL DATA OTOMATIS
window.onload = function() {
    data.game = localStorage.getItem('game');
    data.item = localStorage.getItem('item');
    data.harga = localStorage.getItem('harga');

    if(!data.game) {
        alert('⚠️ Pilih dulu di halaman Daftar Game!');
        location.href = 'daftar-game.html';
        return;
    }

    document.getElementById('game').textContent = data.game;
    document.getElementById('item').textContent = data.item;
    document.getElementById('harga').textContent = data.harga;
};

function buatKode() {
    let kode = '';
    let acak = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    for(let i=0; i<8; i++) kode += acak[Math.floor(Math.random()*acak.length)];
    return 'XDN-' + kode;
}

function buatStruk() {
    data.kode = buatKode();
    let sekarang = new Date();
    data.waktu = sekarang.toLocaleDateString('id-ID') + ' ' + sekarang.getHours() + ':' + String(sekarang.getMinutes()).padStart(2,'0');

    document.getElementById('kode').textContent = data.kode;
    document.getElementById('g').textContent = data.game;
    document.getElementById('i').textContent = data.item;
    document.getElementById('hrg').textContent = data.harga;
    document.getElementById('waktu').textContent = data.waktu;

    document.getElementById('boxStruk').classList.remove('hidden');
}

function kirimWA() {
    let pesan = `*STRUK PEMBELIAN - Xdnry777*
━━━━━━━━━━━━━━━━
📌 Kode: ${data.kode}
🎮 Game: ${data.game}
📦 Item: ${data.item}
💰 Bayar: ${data.harga}
⏰ Waktu: ${data.waktu}
━━━━━━━━━━━━━━━━
Terima Kasih!`;

    window.open('https://wa.me/6285169935089?text=' + encodeURIComponent(pesan), '_blank');
}

function tutupStruk() {
    document.getElementById('boxStruk').classList.add('hidden');
}
</script>
</body>
</html>
