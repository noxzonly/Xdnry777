<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayar - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { gelap:'#121212', kartu:'#1E1E1E', ungu:'#8B5CF6' } } } }
    </script>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <button onclick="history.back()" class="text-gray-300 hover:text-ungu text-xl mb-4"><i class="fa fa-arrow-left"></i></button>
    <h1 class="text-xl font-bold text-ungu mb-4">Data Pesanan</h1>

    <div class="bg-kartu p-4 rounded-xl border border-gray-700 mb-4 space-y-3">
        <div><p class="text-gray-400 text-sm">Game</p><p id="gameNama" class="font-bold">-</p></div>
        <div><p class="text-gray-400 text-sm">Item</p><p id="itemNama" class="font-bold">-</p></div>
        <div><p class="text-gray-400 text-sm">Total Bayar</p><p id="hargaTotal" class="text-ungu font-bold text-xl">-</p></div>
    </div>

    <div class="bg-kartu p-4 rounded-xl border border-gray-700 mb-4 space-y-3">
        <input type="text" id="idTujuan" placeholder="ID Game / Server" class="w-full bg-gelap p-3 rounded-lg outline-none">
        <input type="text" id="namaAkun" placeholder="Nama Akun Game" class="w-full bg-gelap p-3 rounded-lg outline-none">
        <input type="text" id="nomorWa" placeholder="Nomor WhatsApp" class="w-full bg-gelap p-3 rounded-lg outline-none">
    </div>

    <button onclick="kirimPesanan()" class="w-full bg-green-600 py-4 rounded-xl font-bold text-lg hover:bg-green-600/80">
        <i class="fa fa-whatsapp mr-1"></i> KIRIM PESANAN
    </button>
</div>

<script>
let data;
window.onload = function(){
    data = JSON.parse(localStorage.getItem('pilihSekarang')||'{}');
    if(!data.game){alert('Pilih dulu itemnya!');location.href='daftar-game.html';return;}

    document.getElementById('gameNama').textContent = data.game;
    document.getElementById('itemNama').textContent = data.item;
    document.getElementById('hargaTotal').textContent = data.harga;
};

function kirimPesanan(){
    let id = document.getElementById('idTujuan').value.trim();
    let nama = document.getElementById('namaAkun').value.trim();
    let wa = document.getElementById('nomorWa').value.trim();
    if(!id||!nama||!wa){alert('Lengkapi semua data!');return;}

    let riwayat = JSON.parse(localStorage.getItem('riwayat')||'[]');
    riwayat.unshift({
        waktu: new Date().toLocaleString('id-ID'), game:data.game, item:data.item,
        harga:data.harga, idTujuan:id, namaAkun:nama, wa:wa, status:'Baru'
    });
    localStorage.setItem('riwayat', JSON.stringify(riwayat));

    alert('✅ Pesanan terkirim! Cek Riwayat ya.');
    localStorage.removeItem('pilihSekarang');
    location.href='riwayat.html';
}
</script>
</body>
</html>
