<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cara Beli - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>tailwind.config={theme:{extend:{colors:{gelap:'#121212',kartu:'#1E1E1E',ungu:'#8B5CF6'}}}}</script>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <div class="flex items-center mb-6">
        <a href="daftar-game.html" class="text-gray-300 hover:text-ungu text-xl mr-3"><i class="fa fa-arrow-left"></i></a>
        <h1 class="text-xl font-bold text-ungu">Cara Beli</h1>
    </div>
    <div class="bg-kartu p-5 rounded-xl border border-gray-700 space-y-4">
        <div class="flex gap-3"><span class="text-ungu font-bold">1.</span><span>Masuk atau Daftar akun terlebih dahulu</span></div>
        <div class="flex gap-3"><span class="text-ungu font-bold">2.</span><span>Pilih Game yang ingin diisi</span></div>
        <div class="flex gap-3"><span class="text-ungu font-bold">3.</span><span>Pilih jumlah Diamond / Item yang diinginkan</span></div>
        <div class="flex gap-3"><span class="text-ungu font-bold">4.</span><span>Klik tombol <b>Beli Sekarang</b></span></div>
        <div class="flex gap-3"><span class="text-ungu font-bold">5.</span><span>Masukkan ID Game & Nama Akun kamu</span></div>
        <div class="flex gap-3"><span class="text-ungu font-bold">6.</span><span>Klik <b>Kirim Pesanan</b> & Lakukan Pembayaran</span></div>
        <div class="flex gap-3"><span class="text-ungu font-bold">7.</span><span>Tunggu struk muncul, pesanan akan diproses!</span></div>
    </div>
</div>
</body>
</html>
