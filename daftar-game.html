    <div class="flex justify-between items-center mb-6">

<div id="latarTutup" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
function bukaMenu() {
    document.getElementById('menuSamping').classList.remove('-translate-x-full');
    document.getElementById('latarTutup').classList.remove('hidden');
}
function tutupMenu() {
    document.getElementById('menuSamping').classList.add('-translate-x-full');
    document.getElementById('latarTutup').classList.add('hidden');
}

function pilihNominal(namaGame) {
    let namaInput;
    switch(namaGame) {
        case 'Mobile Legends': namaInput='ml'; break;
        case 'Free Fire': namaInput='ff'; break;
        case 'PUBG Mobile': namaInput='pubg'; break;
        case 'Honor of Kings': namaInput='hok'; break;
        case 'Genshin Impact': namaInput='genshin'; break;
        case 'Valorant': namaInput='valorant'; break;
    }

    let pilih = document.querySelector(`input[name="${namaInput}"]:checked`);
    if (!pilih) {
        alert('⚠️ Pilih dulu nominal yang mau dibeli!');
        return;
    }

    let [item, harga] = pilih.value.split('|');
    localStorage.setItem('game', namaGame);
    localStorage.setItem('item', item);
    localStorage.setItem('harga', harga);
    location.href = 'bayar.html';
}
</script>
