<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Game - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gelap: '#121212',
                        kartu: '#1E1E1E',
                        ungu: '#8B5CF6'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">

    <!-- NAVIGASI -->
    <div class="flex justify-between items-center mb-6">
        <button onclick="bukaMenu()" class="text-gray-300 hover:text-ungu text-xl">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="text-xl font-bold text-ungu">Pilih Game</h1>
        <div></div>
    </div>

    <!-- DAFTAR GAME TETAP ADA -->
    <div id="wadahGame" class="space-y-4"></div>

</div>

<!-- MENU SAMPING -->
<div id="menuSamping" class="fixed top-0 left-0 h-full w-64 bg-kartu border-r border-gray-700 z-50 p-4 transform -translate-x-full transition-all">
    <div class="flex justify-between items-center mb-6">
        <span class="text-xl font-bold text-ungu">Xdnry777</span>
        <button onclick="tutupMenu()" class="text-2xl text-gray-300 hover:text-white">
            <i class="fa fa-times"></i>
        </button>
    </div>
    <nav class="space-y-3">
        <a href="index.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-home mr-2"></i> Beranda</a>
        <a href="daftar-game.html" class="block py-2 border-b border-gray-700 text-ungu"><i class="fa fa-gamepad mr-2"></i> Daftar Game</a>
        <a href="riwayat.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-list-alt mr-2"></i> Riwayat Pesanan</a>
        <a href="cara-beli.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-credit-card mr-2"></i> Cara Beli</a>
        <a href="masuk.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-user mr-2"></i> Akun Saya</a>
        <a href="admin.html" id="menuAdmin" class="hidden block py-2 border-b border-gray-700 text-red-500"><i class="fa fa-cog mr-2"></i> Panel Admin</a>
    </nav>
</div>
<div id="latarTutup" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
// FUNGSI MENU
function bukaMenu(){document.getElementById('menuSamping').classList.remove('-translate-x-full');document.getElementById('latarTutup').classList.remove('hidden');}
function tutupMenu(){document.getElementById('menuSamping').classList.add('-translate-x-full');document.getElementById('latarTutup').classList.add('hidden');}

// 📋 DAFTAR GAME TETAP KAMU MILIKI (BISA DITAMBAH JIKA PERLU)
const daftarGameDasar = [
    { game: 'Mobile Legends', item: '25 Diamond', hargaAwal: 'Rp 4.200' },
    { game: 'Mobile Legends', item: '50 Diamond', hargaAwal: 'Rp 8.400' },
    { game: 'Free Fire', item: '70 Diamond', hargaAwal: 'Rp 10.000' },
    { game: 'Free Fire', item: '140 Diamond', hargaAwal: 'Rp 20.000' },
    { game: 'PUBG Mobile', item: '60 UC', hargaAwal: 'Rp 15.000' },
    { game: 'Valorant', item: '475 VP', hargaAwal: 'Rp 75.000' },
    { game: 'Genshin Impact', item: '60 Genesis', hargaAwal: 'Rp 15.000' },
    { game: 'Honor of Kings', item: '288 Token', hargaAwal: 'Rp 10.000' }
];

window.onload = function(){
    // Tampilkan menu admin jika login admin
    if(localStorage.getItem('akunAktif')){
        let akun = JSON.parse(localStorage.getItem('akunAktif'));
        if(akun.tipe === 'admin') document.getElementById('menuAdmin').classList.remove('hidden');
    }

    // Ambil harga yang sudah diatur admin
    let hargaDiatur = JSON.parse(localStorage.getItem('daftarHargaToko') || '[]');
    let wadah = document.getElementById('wadahGame');
    wadah.innerHTML = '';

    // Tampilkan game, pakai harga admin jika ada, kalau tidak pakai harga awal
    daftarGameDasar.forEach(game => {
        // Cek apakah game ini sudah diatur harganya oleh admin
        let dataAdmin = hargaDiatur.find(d => d.game === game.game && d.item === game.item);
        let hargaAkhir = dataAdmin ? dataAdmin.harga : game.hargaAwal;

        let kotak = document.createElement('div');
        kotak.className = 'bg-kartu p-4 rounded-xl border border-gray-700 hover:border-ungu/50 transition-all cursor-pointer';
        kotak.innerHTML = `
            <div class="flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-lg">${game.game}</h3>
                    <p class="text-gray-400 text-sm">${game.item}</p>
                </div>
                <span class="text-ungu font-bold text-xl">${hargaAkhir}</span>
            </div>
        `;

        // Simpan data saat diklik untuk beli
        kotak.onclick = () => {
            let dataBeli = {
                game: game.game,
                item: game.item,
                harga: hargaAkhir
            };
            localStorage.setItem('pilihanSaatIni', JSON.stringify(dataBeli));
            location.href = 'beli.html';
        };

        wadah.appendChild(kotak);
    });
};
</script>
</body>
</html>
