<div id="latarTutup" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
function bukaMenu() { document.getElementById('menuSamping').classList.remove('-translate-x-full'); document.getElementById('latarTutup').classList.remove('hidden'); }
function tutupMenu() { document.getElementById('menuSamping').classList.add('-translate-x-full'); document.getElementById('latarTutup').classList.add('hidden'); }

function lanjutBeli(namaGame) {
    let namaRadio;
    if(namaGame === 'Mobile Legends') namaRadio = 'pilih';
    else if(namaGame === 'Free Fire') namaRadio = 'pilih2';
    else if(namaGame === 'PUBG Mobile') namaRadio = 'pilih3';
    else if(namaGame === 'Honor of Kings') namaRadio = 'pilih4';
    else if(namaGame === 'Genshin Impact') namaRadio = 'pilih5';
    else namaRadio = 'pilih6';

    let pilih = document.querySelector(`input[name="${namaRadio}"]:checked`);
    if(!pilih) { alert('Pilih dulu nominalnya!'); return; }

    let [item, harga] = pilih.value.split('|');
    localStorage.setItem('game', namaGame);
    localStorage.setItem('item', item);
    localStorage.setItem('harga', harga);
    location.href = 'bayar.html';
}
</script>
