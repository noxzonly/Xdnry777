<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Game - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gelap: '#121212',
                        kartu: '#1E1E1E',
                        ungu: '#8B5CF6'
                    }
                }
            }
        }
    </script>
    <style>
        button, a, label {
            cursor: pointer !important;
            position: relative !important;
            z-index: 10 !important;
            pointer-events: auto !important;
        }
        * {
            pointer-events: auto !important;
        }
    </style>
</head>
<body class="bg-gelap text-white min-h-screen p-4">

<div class="max-w-md mx-auto">
    <!-- NAVIGASI -->
    <div class="flex justify-between items-center mb-6">
        <button onclick="bukaMenu()" class="text-gray-300 hover:text-ungu text-xl">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="text-xl font-bold"><span class="text-ungu">Pilih Game Kamu</span></h1>
        <div></div>
    </div>

    <div class="space-y-6">
        <!-- 🎮 MOBILE LEGENDS -->
        <div class="bg-kartu p-6 rounded-xl border border-gray-700">
            <div class="text-center mb-4">
                <img src="https://i.imgur.com/6XZpKqG.png" class="w-24 h-24 mx-auto rounded-xl mb-2 object-cover">
                <h3 class="text-2xl font-bold">Mobile Legends</h3>
                <p class="text-gray-400">Diamond</p>
            </div>

            <div class="space-y-3 mb-6">
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="ml" value="12 Diamond|Rp 3.800" class="mr-2 accent-ungu">
                    <span>12 Diamond</span>
                    <span class="font-bold text-ungu">Rp 3.800</span>
                </label>
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="ml" value="28 Diamond|Rp 7.900" class="mr-2 accent-ungu">
                    <span>28 Diamond</span>
                    <span class="font-bold text-ungu">Rp 7.900</span>
                </label>
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="ml" value="56 Diamond|Rp 15.500" class="mr-2 accent-ungu">
                    <span>56 Diamond</span>
                    <span class="font-bold text-ungu">Rp 15.500</span>
                </label>
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="ml" value="112 Diamond|Rp 30.000" class="mr-2 accent-ungu">
                    <span>112 Diamond</span>
                    <span class="font-bold text-ungu">Rp 30.000</span>
                </label>
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="ml" value="240 Diamond|Rp 62.000" class="mr-2 accent-ungu">
                    <span>240 Diamond</span>
                    <span class="font-bold text-ungu">Rp 62.000</span>
                </label>
            </div>

            <button onclick="pilihNominal('Mobile Legends')" class="w-full bg-ungu py-3 rounded-xl text-lg font-bold hover:bg-ungu/80 active:scale-95 transition">
                Beli Sekarang
            </button>
        </div>

        <!-- 🎮 FREE FIRE -->
        <div class="bg-kartu p-6 rounded-xl border border-gray-700">
            <div class="text-center mb-4">
                <img src="https://i.imgur.com/9cXQZpD.png" class="w-24 h-24 mx-auto rounded-xl mb-2 object-cover">
                <h3 class="text-2xl font-bold">Free Fire</h3>
                <p class="text-gray-400">Diamond</p>
            </div>

            <div class="space-y-3 mb-6">
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="ff" value="20 Diamond|Rp 3.500" class="mr-2 accent-ungu">
                    <span>20 Diamond</span>
                    <span class="font-bold text-ungu">Rp 3.500</span>
                </label>
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="ff" value="55 Diamond|Rp 9.800" class="mr-2 accent-ungu">
                    <span>55 Diamond</span>
                    <span class="font-bold text-ungu">Rp 9.800</span>
                </label>
            </div>

            <button onclick="pilihNominal('Free Fire')" class="w-full bg-ungu py-3 rounded-xl text-lg font-bold hover:bg-ungu/80 active:scale-95 transition">
                Beli Sekarang
            </button>
        </div>

        <!-- 🎮 PUBG MOBILE -->
        <div class="bg-kartu p-6 rounded-xl border border-gray-700">
            <div class="text-center mb-4">
                <img src="https://i.imgur.com/rdcXjwM.png" class="w-24 h-24 mx-auto rounded-xl mb-2 object-cover">
                <h3 class="text-2xl font-bold">PUBG Mobile</h3>
                <p class="text-gray-400">UC</p>
            </div>

            <div class="space-y-3 mb-6">
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="pubg" value="60 UC|Rp 15.000" class="mr-2 accent-ungu">
                    <span>60 UC</span>
                    <span class="font-bold text-ungu">Rp 15.000</span>
                </label>
                <label class="flex justify-between items-center p-3 bg-gelap rounded-lg cursor-pointer hover:bg-gelap/80">
                    <input type="radio" name="pubg" value="325 UC|Rp 75.000" class="mr-2 accent-ungu">
                    <span>325 UC</span>
                    <span class="font-bold text-ungu">Rp 75.000</span>
                </label>
            </div>

            <button onclick="pilihNominal('PUBG Mobile')" class="w-full bg-ungu py-3 rounded-xl text-lg font-bold hover:bg-ungu/80 active:scale-95 transition">
                Beli Sekarang
            </button>
        </div>
    </div>
</div>

<!-- MENU SAMPING -->
<div id="menuSamping" class="fixed top-0 left-0 h-full w-64 bg-kartu border-r border-gray-700 z-50 p-4 transform -translate-x-full transition-transform duration-300">
    <div class="flex justify-between items-center mb-6">
        <span class="text-xl font-bold text-ungu">Xdnry777</span>
        <button onclick="tutupMenu()" class="text-2xl text-gray-300 hover:text-white">
            <i class="fa fa-times"></i>
        </button>
    </div>

    <nav class="space-y-3">
        <a href="index.html" class="block py-2 border-b border-gray-700 text-ungu">
            <i class="fa fa-home mr-2"></i> Beranda
        </a>
        <a href="daftar-game.html" class="block py-2 border-b border-gray-700 hover:text-ungu">
            <i class="fa fa-gamepad mr-2"></i> Daftar Game
        </a>
        <a href="riwayat.html" class="block py-2 border-b border-gray-700 hover:text-ungu">
            <i class="fa fa-list-alt mr-2"></i> Riwayat Pesanan
        </a>
        <a href="#" class="block py-2 border-b border-gray-700 hover:text-ungu">
            <i class="fa fa-credit-card mr-2"></i> Cara Beli
        </a>
        <a href="#" class="block py-2 border-b border-gray-700 hover:text-ungu">
            <i class="fa fa-user mr-2"></i> Masuk / Daftar
        </a>
        <a href="#" class="block py-2 hover:text-ungu">
            <i class="fa fa-sign-out mr-2"></i> Keluar Akun
        </a>
    </nav>
</div>

<div id="latarTutup" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
function bukaMenu() {
    document.getElementById('menuSamping').classList.remove('-translate-x-full');
    document.getElementById('latarTutup').classList.remove('hidden');
}
function tutupMenu() {
    document.getElementById('menuSamping').classList.add('-translate-x-full');
    document.getElementById('latarTutup').classList.add('hidden');
}

function pilihNominal(namaGame) {
    let namaInput = namaGame === 'Mobile Legends' ? 'ml' : namaGame === 'Free Fire' ? 'ff' : 'pubg';
    let pilih = document.querySelector(`input[name="${namaInput}"]:checked`);
    
    if (!pilih) {
        alert('⚠️ Pilih dulu nominal yang mau dibeli!');
        return;
    }

    let [item, harga] = pilih.value.split('|');
    localStorage.setItem('game', namaGame);
    localStorage.setItem('item', item);
    localStorage.setItem('harga', harga);
    location.href = 'bayar.html';
}
</script>

</body>
</html>
