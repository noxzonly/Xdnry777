<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Game - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { gelap:'#121212', kartu:'#1E1E1E', ungu:'#8B5CF6' } } } }
    </script>
    <style>.logo{width:48px;height:48px;border-radius:12px;object-fit:cover;}</style>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center mb-6">
        <button onclick="bukaMenu()" class="text-gray-300 hover:text-ungu text-xl">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="text-xl font-bold text-ungu">Pilih Item Top Up</h1>
        <div></div>
    </div>

    <div class="space-y-4">
        <!-- Mobile Legends -->
        <div class="bg-kartu p-4 rounded-xl border border-gray-700 cursor-pointer hover:border-ungu/50 flex items-center gap-3" onclick="beli('Mobile Legends', '70 Diamond', 'Rp 28.000')">
            <img src="https://i.imgur.com/6XZpKqG.png" class="logo">
            <div class="flex-1"><h3 class="font-bold">Mobile Legends</h3><p class="text-gray-400 text-sm">70 Diamond</p></div>
            <span class="text-ungu font-bold">Rp 28.000</span>
        </div>
        <div class="bg-kartu p-4 rounded-xl border border-gray-700 cursor-pointer hover:border-ungu/50 flex items-center gap-3" onclick="beli('Mobile Legends', '140 Diamond', 'Rp 55.000')">
            <img src="https://i.imgur.com/6XZpKqG.png" class="logo">
            <div class="flex-1"><h3 class="font-bold">Mobile Legends</h3><p class="text-gray-400 text-sm">140 Diamond</p></div>
            <span class="text-ungu font-bold">Rp 55.000</span>
        </div>

        <!-- Free Fire -->
        <div class="bg-kartu p-4 rounded-xl border border-gray-700 cursor-pointer hover:border-ungu/50 flex items-center gap-3" onclick="beli('Free Fire', '70 Diamond', 'Rp 10.000')">
            <img src="https://i.imgur.com/9cXQZpD.png" class="logo">
            <div class="flex-1"><h3 class="font-bold">Free Fire</h3><p class="text-gray-400 text-sm">70 Diamond</p></div>
            <span class="text-ungu font-bold">Rp 10.000</span>
        </div>
        <div class="bg-kartu p-4 rounded-xl border border-gray-700 cursor-pointer hover:border-ungu/50 flex items-center gap-3" onclick="beli('Free Fire', '140 Diamond', 'Rp 20.000')">
            <img src="https://i.imgur.com/9cXQZpD.png" class="logo">
            <div class="flex-1"><h3 class="font-bold">Free Fire</h3><p class="text-gray-400 text-sm">140 Diamond</p></div>
            <span class="text-ungu font-bold">Rp 20.000</span>
        </div>
    </div>
</div>

<!-- MENU SAMPING -->
<div id="menuSamping" class="fixed top-0 left-0 h-full w-64 bg-kartu border-r border-gray-700 z-50 p-4 transform -translate-x-full transition-all">
    <div class="flex justify-between items-center mb-6">
        <span class="text-xl font-bold text-ungu">Xdnry777</span>
        <button onclick="tutupMenu()" class="text-2xl text-gray-300 hover:text-white">
            <i class="fa fa-times"></i>
        </button>
    </div>
    <nav class="space-y-3">
        <a href="index.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-home mr-2"></i> Beranda</a>
        <a href="daftar-game.html" class="block py-2 border-b border-gray-700 text-ungu"><i class="fa fa-gamepad mr-2"></i> Daftar Game</a>
        <a href="riwayat.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-list-alt mr-2"></i> Riwayat Pesanan</a>
        <a href="cara-beli.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-credit-card mr-2"></i> Cara Beli</a>
        <a href="masuk.html" class="block py-2 border-b border-gray-700 hover:text-ungu"><i class="fa fa-user mr-2"></i> Akun Saya</a>
    </nav>
</div>
<div id="latarTutup" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
function bukaMenu(){
    document.getElementById('menuSamping').classList.remove('-translate-x-full');
    document.getElementById('latarTutup').classList.remove('hidden');
}
function tutupMenu(){
    document.getElementById('menuSamping').classList.add('-translate-x-full');
    document.getElementById('latarTutup').classList.add('hidden');
}

function beli(game, item, harga){
    localStorage.setItem('pilihSekarang', JSON.stringify({game:game, item:item, harga:harga}));
    location.href='bayar.html';
}
</script>
</body>
</html>
