<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Game - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { gelap:'#121212', kartu:'#1E1E1E', ungu:'#8B5CF6' } } } }
    </script>
    <style>.logo{width:48px;height:48px;border-radius:12px;}</style>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <h1 class="text-xl font-bold text-center text-ungu mb-6">Pilih Game</h1>
    <div id="wadah" class="space-y-4"></div>
</div>

<script>
window.onload = function(){
    // AMBIL DATA DENGAN KUNCI YANG SAMA PERSIS: "dataToko"
    let semua = JSON.parse(localStorage.getItem('dataToko')||'[]');
    let wadah = document.getElementById('wadah');
    wadah.innerHTML = '';

    if(semua.length===0){
        wadah.innerHTML='<p class="text-center text-gray-400">Belum ada item</p>';
        return;
    }

    semua.forEach(i=>{
        let kotak = document.createElement('div');
        kotak.className = 'bg-kartu p-4 rounded-xl flex items-center gap-3 cursor-pointer';
        kotak.innerHTML = `
            <img src="${i.logo}" class="logo">
            <div class="flex-1"><h3 class="font-bold">${i.game}</h3><p class="text-gray-400">${i.item}</p></div>
            <span class="text-ungu font-bold">${i.harga}</span>
        `;
        kotak.onclick = () => {
            localStorage.setItem('pilihSekarang', JSON.stringify({game:i.game,item:i.item,harga:i.harga}));
            location.href='bayar.html';
        };
        wadah.appendChild(kotak);
    });
};
</script>
</body>
</html>
