<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk / Daftar - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { gelap: '#121212', ungu: '#8B5CF6' } } }
        }
    </script>
    <style>
        .gradasi {
            background: linear-gradient(90deg, #8B5CF6, #EC4899);
            -webkit-background-clip: text;
            color: transparent;
        }
        /* ✅ EFEK KOTAK TRANSPARAN + KACA */
        .kotak-transparan {
            background: rgba(30, 30, 40, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .input-transparan {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .input-transparan:focus {
            outline: none;
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-gelap text-white min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #12121a 0%, #1a1528 100%);">

    <div class="kotak-transparan p-6 rounded-2xl w-full max-w-md shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-6">
            <span class="gradasi">Xdnry777</span>
        </h1>

        <!-- TOMBOL PILIH: MASUK / DAFTAR -->
        <div class="flex mb-6 bg-white/5 rounded-xl p-1">
            <button id="btnMasuk" onclick="bukaForm('masuk')" class="flex-1 py-2.5 rounded-xl font-bold bg-ungu text-white shadow-lg">Masuk</button>
            <button id="btnDaftar" onclick="bukaForm('daftar')" class="flex-1 py-2.5 rounded-xl font-bold text-gray-400 hover:text-white/80">Daftar</button>
        </div>

        <!-- FORM MASUK -->
        <div id="formMasuk">
            <input type="text" id="userMasuk" placeholder="Username" class="w-full input-transparan rounded-xl p-3.5 mb-3.5 text-white placeholder-gray-400">
            <input type="password" id="passMasuk" placeholder="Kata Sandi" class="w-full input-transparan rounded-xl p-3.5 mb-5 text-white placeholder-gray-400">
            <button onclick="cekLogin()" class="w-full bg-ungu py-3.5 rounded-xl font-bold text-white hover:opacity-95 transition-all shadow-lg">Masuk Akun</button>
        </div>

        <!-- FORM DAFTAR -->
        <div id="formDaftar" class="hidden">
            <input type="text" id="namaDaftar" placeholder="Nama Lengkap" class="w-full input-transparan rounded-xl p-3.5 mb-3.5 text-white placeholder-gray-400">
            <input type="text" id="userDaftar" placeholder="Buat Username" class="w-full input-transparan rounded-xl p-3.5 mb-3.5 text-white placeholder-gray-400">
            <input type="password" id="passDaftar" placeholder="Buat Kata Sandi" class="w-full input-transparan rounded-xl p-3.5 mb-5 text-white placeholder-gray-400">
            <button onclick="buatAkun()" class="w-full bg-ungu py-3.5 rounded-xl font-bold text-white hover:opacity-95 transition-all shadow-lg">Daftar Akun</button>
        </div>

        <p class="text-center mt-5 text-sm text-gray-400">
            Aman & Terpercaya ✅
        </p>
    </div>

<script>
function bukaForm(tipe) {
    if(tipe === 'masuk') {
        document.getElementById('formMasuk').classList.remove('hidden');
        document.getElementById('formDaftar').classList.add('hidden');
        document.getElementById('btnMasuk').classList.add('bg-ungu', 'text-white', 'shadow-lg');
        document.getElementById('btnMasuk').classList.remove('text-gray-400');
        document.getElementById('btnDaftar').classList.remove('bg-ungu', 'text-white', 'shadow-lg');
        document.getElementById('btnDaftar').classList.add('text-gray-400');
    } else {
        document.getElementById('formDaftar').classList.remove('hidden');
        document.getElementById('formMasuk').classList.add('hidden');
        document.getElementById('btnDaftar').classList.add('bg-ungu', 'text-white', 'shadow-lg');
        document.getElementById('btnDaftar').classList.remove('text-gray-400');
        document.getElementById('btnMasuk').classList.remove('bg-ungu', 'text-white', 'shadow-lg');
        document.getElementById('btnMasuk').classList.add('text-gray-400');
    }
}

function buatAkun() {
    const nama = document.getElementById('namaDaftar').value.trim();
    const user = document.getElementById('userDaftar').value.trim();
    const pass = document.getElementById('passDaftar').value.trim();

    if(!nama || !user || !pass) { alert('⚠️ Semua kolom harus diisi!'); return; }
    if(localStorage.getItem('akun_' + user)) { alert('❌ Username sudah dipakai!'); return; }

    localStorage.setItem('akun_' + user, JSON.stringify({nama, sandi: pass}));
    alert('✅ Akun berhasil dibuat! Silakan Masuk.');
    bukaForm('masuk');
}

function cekLogin() {
    const user = document.getElementById('userMasuk').value.trim();
    const pass = document.getElementById('passMasuk').value.trim();

    if(!user || !pass) { alert('⚠️ Isi Username & Kata Sandi!'); return; }

    const data = localStorage.getItem('akun_' + user);
    if(!data) { alert('❌ Belum punya akun? Silakan Daftar dulu!'); bukaForm('daftar'); return; }

    const akun = JSON.parse(data);
    if(akun.sandi !== pass) { alert('❌ Kata sandi salah!'); return; }

    localStorage.setItem('login', 'ya');
    localStorage.setItem('nama', akun.nama);
    alert('✅ Selamat Datang, ' + akun.nama + '!');
    location.href = 'index.html';
}
</script>

</body>
</html>
