<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>tailwind.config={theme:{extend:{colors:{gelap:'#121212',kartu:'#1E1E1E',ungu:'#8B5CF6'}}}}</script>
</head>
<body class="bg-gelap text-white min-h-screen p-4">
<div class="max-w-md mx-auto">
    <div class="flex items-center mb-6">
        <a href="daftar-game.html" class="text-gray-300 hover:text-ungu text-xl mr-3"><i class="fa fa-arrow-left"></i></a>
        <h1 class="text-xl font-bold text-ungu">Riwayat Pesanan</h1>
    </div>

    <div id="daftarRiwayat" class="space-y-3"></div>
    <div id="kosong" class="text-center text-gray-400 py-10 hidden">
        <i class="fa fa-history text-4xl mb-3"></i>
        <p>Belum ada riwayat pesanan</p>
    </div>
</div>

<script>
if(!localStorage.getItem('akunAktif')){alert('⚠️ Wajib Masuk!');location.href='masuk.html';}

let riwayat=JSON.parse(localStorage.getItem('riwayat')||'[]');
let wadah=document.getElementById('daftarRiwayat');

if(riwayat.length===0){document.getElementById('kosong').classList.remove('hidden');}
else{riwayat.reverse().forEach(r=>{
    let el=document.createElement('div');
    el.className='bg-kartu p-4 rounded-xl border border-gray-700';
    el.innerHTML=`
        <div class="flex justify-between items-center mb-2">
            <span class="font-bold">${r.game}</span>
            <span class="text-green-400 text-sm">${r.status}</span>
        </div>
        <p class="text-gray-400 text-sm">${r.item}</p>
        <p class="text-ungu font-bold">${r.harga}</p>
        <p class="text-xs text-gray-500 mt-2">${r.waktu} | ${r.kode}</p>
    `;
    wadah.appendChild(el);
});}
</script>
</body>
</html>
